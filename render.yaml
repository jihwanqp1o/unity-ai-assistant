databases:
  - name: unity-ai-assistant-db
    plan: free # 90일 후 만료됨(Render 무료 Postgres 정책) — 만료 전 알림 오면 새로 만들어 연결
    databaseName: unity_ai_assistant
    user: unity_ai_assistant

services:
  - type: web
    name: unity-ai-assistant
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Render 대시보드에서 직접 입력 (리포에 커밋되지 않는 비밀값)
      - key: JWT_SECRET
        generateValue: true # Render가 32바이트 이상의 랜덤 값을 자동 생성
      - key: FRONTEND_BASE_URL
        value: https://unity-ai-assistant.onrender.com
      - key: BACKEND_BASE_URL
        value: https://unity-ai-assistant.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: unity-ai-assistant-db
          property: connectionString
